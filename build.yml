variables:
  - template: pipeline-templates/global-variables.yml

trigger:
  branches:
    include:
      - master
      - release-*
  paths:
    exclude:
      - README.md

pr:
  branches:
    include:
      - master
      - release-*
  paths:
    exclude:
      - README.md

jobs:
# Job 1: PR Validation Windows - runs only on pull requests
- job: PRValidation_Windows
  displayName: "PR Validation: Windows - Build module and Docker image"
  condition: eq(variables['Build.Reason'], 'PullRequest')
  pool:
    vmImage: 'windows-latest'
  steps:
    - template: pipeline-templates/build-windows-steps.yml

    # TEMPORARY: Signing steps added for PR testing - revert once signing is confirmed working
    - task: AzureKeyVault@2
      displayName: 'Get code signing certificate from Azure Key Vault'
      inputs:
        ConnectedServiceName: "OneIdentity.Infrastructure.SPPCodeSigning"
        KeyVaultName: "SPPCodeSigning"
        SecretsFilter: "SPPCodeSigning-Password, SPPCodeSigning-TotpPrivateKey"

    # Download and extract CodeSignTool — SSL.com's standalone signing tool that talks directly
    # to the eSigner cloud API, bypassing eSignerCKA and the Windows certificate store entirely.
    - powershell: |
        $ErrorActionPreference = "Stop"
        Invoke-WebRequest -OutFile CodeSignTool.zip "https://www.ssl.com/download/codesigntool-for-windows/"
        Expand-Archive -Force CodeSignTool.zip -DestinationPath "$(Build.SourcesDirectory)\CodeSignTool"
        Remove-Item CodeSignTool.zip
        $bat = Get-ChildItem -Path "$(Build.SourcesDirectory)\CodeSignTool" -Recurse -Filter "CodeSignTool.bat" | Select-Object -First 1
        if (-not $bat) {
            throw "CodeSignTool.bat not found after extraction"
        }
        Write-Verbose -Verbose "CodeSignTool located at: $($bat.FullName)"
      displayName: "Download and extract CodeSignTool"

    - powershell: |
        $ErrorActionPreference = "Stop"
        $catalogfile = (Get-Module safeguard-ps -ListAvailable)[0].Path -replace "psd1","cat"
        if (-not (Test-Path $catalogfile)) {
            throw "Catalog file not found: $catalogfile"
        }
        Write-Verbose -Verbose "Signing catalog file: $catalogfile"
        $bat = Get-ChildItem -Path "$(Build.SourcesDirectory)\CodeSignTool" -Recurse -Filter "CodeSignTool.bat" | Select-Object -First 1
        if (-not $bat) {
            throw "CodeSignTool.bat not found"
        }
        Write-Verbose -Verbose "Using CodeSignTool: $($bat.FullName)"
        & $bat.FullName sign -username "ssl.oid.safeguardpp@groups.quest.com" -password "$(SPPCodeSigning-Password)" -totp_secret "$(SPPCodeSigning-TotpPrivateKey)" -input_file_path "$catalogfile"
        if ($LASTEXITCODE -ne 0) {
            throw "CodeSignTool failed with exit code $LASTEXITCODE"
        }
        # Verify the signature independently
        $verify = Get-AuthenticodeSignature -FilePath $catalogfile
        Write-Verbose -Verbose "Verification status: $($verify.Status)"
        if ($verify.Status -ne "Valid") {
            throw "Signature verification failed with status '$($verify.Status)': $($verify.StatusMessage)"
        }
        Write-Host "Catalog file signed and verified successfully"
      displayName: 'Signing PowerShell module catalog file'

# Job 2: PR Validation Linux - runs only on pull requests
- job: PRValidation_Linux
  displayName: "PR Validation: Linux - Build module and Docker images"
  condition: eq(variables['Build.Reason'], 'PullRequest')
  pool:
    vmImage: 'ubuntu-latest'
  steps:
    - template: pipeline-templates/build-linux-steps.yml

# Job 3: Build and Publish Windows - runs only on successful merges (not PRs)
- job: BuildAndPublish_Windows
  displayName: "Build and publish Windows module and Docker image"
  condition: ne(variables['Build.Reason'], 'PullRequest')
  pool:
    vmImage: 'windows-latest'
  steps:
    - template: pipeline-templates/build-windows-steps.yml
    - task: AzureKeyVault@2
      inputs:
        azureSubscription: 'SafeguardOpenSource'
        KeyVaultName: 'SafeguardBuildSecrets'
        SecretsFilter: 'PowerShellGalleryApiKey'
      displayName: 'Get PowerShell Gallery API key from Sandbox Azure Key Vault'

    - task: AzureKeyVault@2
      displayName: 'Get code signing certificate from Azure Key Vault'
      inputs:
        # The "Safeguard Privileged Passwords" project in Azure has been setup with a new Connected Service under Project Settings > Service Connections.
        # We may not have permissions to view them, but they are there. And this service connection should then have access to
        # the SPPCodeSigning Key Vault under the OneIdentity.Ops.SaaS.AzureDevOpsInfrastructure subscription, in the CodeSigningCertificates
        # resource group.
        ConnectedServiceName: "OneIdentity.Infrastructure.SPPCodeSigning"
        KeyVaultName: "SPPCodeSigning"
        SecretsFilter: "SPPCodeSigning-Password, SPPCodeSigning-TotpPrivateKey"
        # PRs from repository forks are not allowed to access secrets in the pipeline. For more information see https://learn.microsoft.com/en-us/azure/devops/pipelines/repos/github?view=azure-devops&tabs=yaml#access-restrictions

    # SSL.com CodeSignTool: standalone signing tool that talks directly to the eSigner cloud API,
    # bypassing eSignerCKA and the Windows certificate store entirely.
    # https://www.ssl.com/guide/azure-devops-cloud-signing-integration-guide/
    - powershell: |
        $ErrorActionPreference = "Stop"
        Invoke-WebRequest -OutFile CodeSignTool.zip "https://www.ssl.com/download/codesigntool-for-windows/"
        Expand-Archive -Force CodeSignTool.zip -DestinationPath "$(Build.SourcesDirectory)\CodeSignTool"
        Remove-Item CodeSignTool.zip
        $bat = Get-ChildItem -Path "$(Build.SourcesDirectory)\CodeSignTool" -Recurse -Filter "CodeSignTool.bat" | Select-Object -First 1
        if (-not $bat) {
            throw "CodeSignTool.bat not found after extraction"
        }
        Write-Verbose -Verbose "CodeSignTool located at: $($bat.FullName)"
      displayName: "Download and extract CodeSignTool"

    - powershell: |
        $ErrorActionPreference = "Stop"
        $catalogfile = (Get-Module safeguard-ps -ListAvailable)[0].Path -replace "psd1","cat"
        if (-not (Test-Path $catalogfile)) {
            throw "Catalog file not found: $catalogfile"
        }
        Write-Verbose -Verbose "Signing catalog file: $catalogfile"
        $bat = Get-ChildItem -Path "$(Build.SourcesDirectory)\CodeSignTool" -Recurse -Filter "CodeSignTool.bat" | Select-Object -First 1
        if (-not $bat) {
            throw "CodeSignTool.bat not found"
        }
        Write-Verbose -Verbose "Using CodeSignTool: $($bat.FullName)"
        & $bat.FullName sign -username "ssl.oid.safeguardpp@groups.quest.com" -password "$(SPPCodeSigning-Password)" -totp_secret "$(SPPCodeSigning-TotpPrivateKey)" -input_file_path "$catalogfile"
        if ($LASTEXITCODE -ne 0) {
            throw "CodeSignTool failed with exit code $LASTEXITCODE"
        }
        # Verify the signature independently
        $verify = Get-AuthenticodeSignature -FilePath $catalogfile
        Write-Verbose -Verbose "Verification status: $($verify.Status)"
        if ($verify.Status -ne "Valid") {
            throw "Signature verification failed with status '$($verify.Status)': $($verify.StatusMessage)"
        }
        Write-Host "Catalog file signed and verified successfully"
      displayName: 'Signing PowerShell module catalog file'

    - task: PowerShell@2
      inputs:
        targetType: inline
        failOnStderr: true
        script: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Install-PackageProvider Nuget -Force
          Get-PSRepository
          Publish-Module -Name safeguard-ps -NuGetApiKey "$(PowerShellGalleryApiKey)" -Verbose -SkipAutomaticTags -Force
      displayName: 'Publish PowerShell module to PowerShell Gallery'

    - task: AzureKeyVault@2
      inputs:
        azureSubscription: 'SafeguardOpenSource'
        KeyVaultName: 'SafeguardBuildSecrets'
        SecretsFilter: 'DockerHubAccessToken,DockerHubPassword'
      displayName: 'Get Docker Hub Access Token from Sandbox Azure Key Vault'
      continueOnError: false
      condition: and( succeeded(), eq( variables.shouldPublishDocker, true ) )

    - task: Bash@3
      inputs:
        targetType: 'inline'
        failOnStderr: true
        script: |
          docker login -u danpetersonoi --password-stdin <<<$(DockerHubAccessToken) 2>/dev/null
          docker push oneidentity/safeguard-ps:$(VersionString)-windowsservercore
          docker logout
      displayName: 'Pushing Docker Windows Server Core image to Docker Hub'
      condition: and( succeeded(), eq( variables.shouldPublishDocker, true ) )

# Job 4: Build and Publish Linux - runs only on successful merges (not PRs)
- job: BuildAndPublish_Linux
  displayName: "Build and publish Linux module and Docker images"
  condition: ne(variables['Build.Reason'], 'PullRequest')
  pool:
    vmImage: 'ubuntu-latest'
  steps:
    - template: pipeline-templates/build-linux-steps.yml
    - task: AzureKeyVault@2
      inputs:
        azureSubscription: 'SafeguardOpenSource'
        KeyVaultName: 'SafeguardBuildSecrets'
        SecretsFilter: 'DockerHubAccessToken,DockerHubPassword'
      displayName: 'Get Docker Hub Access Token from Sandbox Azure Key Vault'
      condition: and( succeeded(), eq( variables.shouldPublishDocker, true ) )
    - task: Bash@3
      inputs:
        targetType: 'inline'
        failOnStderr: true
        script: |
          docker login -u danpetersonoi --password-stdin <<<$(DockerHubAccessToken) 2>/dev/null
          docker push oneidentity/safeguard-ps:$(VersionString)-ubuntu
          docker push oneidentity/safeguard-ps:$(VersionString)-mariner
          docker push oneidentity/safeguard-ps:$(VersionString)-alpine
          docker push oneidentity/safeguard-ps:latest
          docker logout
      condition: and( succeeded(), eq(variables.shouldPublishDocker, true) )
      displayName: 'Pushing Linux Docker images to Docker Hub'

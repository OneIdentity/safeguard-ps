variables:
  - name: version
    value: "8.3.0"
  - name: isTagBuild
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/tags/') }}
  - name: isPrerelease
    ${{ if startsWith(variables['Build.SourceBranch'], 'refs/tags/') }}:
      value: ${{ false }}
    ${{ else }}:
      value: ${{ true }}
  - name: shouldPublishDocker
    ${{ if startsWith(variables['Build.SourceBranch'], 'refs/tags/') }}:
      value: ${{ true }}
    ${{ else }}:
      value: ${{ false }}

# Dependabot configuration for safeguard-ps.
#
# Ecosystems covered:
#   * github-actions -- workflow file dependencies, when any are added.
#
# Not covered (intentional):
#   * No PowerShell-module package ecosystem is supported by Dependabot
#     today. Module dependencies declared in safeguard-ps.psd1 must be
#     reviewed manually.
#   * CodeQL is not enabled in this repository because CodeQL does not
#     support PowerShell as a language. This is a conscious skip.
#
# GitHub Private Vulnerability Disclosure (PVD) should be enabled in the
# repository's Security tab; that toggle is not file-driven.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
